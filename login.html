<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login</title>

<style>
/* ================= GLOBAL ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("LUMOSA IMAGE.jpeg") no-repeat center/cover;
    color: white;
}

/* ================= NAVBAR ================= */
.header {
    background: #0a2a66;
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 40px;
    border-radius: 50%;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li a {
    text-decoration: none;
    color: #fff;
    transition: 0.3s;
}

nav ul li a:hover {
    color: #ffd700;
}

.login-btn {
    background: #ffd700;
    color: #000 !important;
    padding: 5px 10px;
    border-radius: 5px;
}

/* MOBILE MENU */
.menu-btn {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* ================= PAGE ================= */
.page {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.login-container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.login-container h2 {
    margin-bottom: 25px;
    font-size: 1.8rem;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #ffd700;
    color: #000;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #e6b800;
}

/* ================= FOOTER ================= */
footer {
    background: #0a2a66;
    color: white;
    text-align: center;
    padding: 15px;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
    nav ul {
        position: absolute;
        top: 70px;
        right: 0;
        background: #0a2a66;
        flex-direction: column;
        width: 200px;
        display: none;
        padding: 10px;
    }

    nav ul.show {
        display: flex;
    }

    .menu-btn {
        display: block;
    }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<header class="header">
    <div class="navbar">
        <div class="logo-area">
            <img src="LUM PIC.jpg" class="logo" alt="Lumosa Logo">
            <h1>LUMOSA</h1>
        </div>

        <nav>
            <ul id="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="leadership.html">Leadership</a></li>
                <li><a href="LUMOSA FORM.HTML">Forms</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="login-btn">Login</a></li>
            </ul>
        </nav>

        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>
</header>

<!-- PAGE CONTENT -->
<section class="page">
    <div class="login-container">
        <h2>Member Login</h2>

        <!-- FORMSPREE FORM -->
        <form action="https://formspree.io/f/yourID" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p style="margin-top:15px; font-size:0.9rem;">*This form sends login info to your email via Formspree (for demo/testing only).</p>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Lumosa Umu Region</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
